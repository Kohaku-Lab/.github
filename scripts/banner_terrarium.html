<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 320px;
    overflow: hidden;
    background: linear-gradient(135deg, #1A1820, #1E1A2A);
    display: flex;
    align-items: center;
    font-family: 'Inter', system-ui, sans-serif;
    position: relative;
  }

  /* Subtle background glow */
  .glow {
    position: absolute; border-radius: 50%; opacity: 0.07; pointer-events: none;
  }
  .g1 { width: 500px; height: 500px; background: radial-gradient(circle, #5A4FCF, transparent 70%); top: -150px; right: -100px; }
  .g2 { width: 350px; height: 350px; background: radial-gradient(circle, #E8A0BF, transparent 70%); bottom: -100px; left: 150px; }

  /* Bottom accent */
  .accent {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #D4920A, #E8A0BF, #5A4FCF, #2D5FA0);
  }

  /* Avatar */
  .avatar-wrap { flex-shrink: 0; margin-left: 60px; margin-right: 45px; }
  .avatar {
    width: 200px; height: 200px;
    border-radius: 50%; object-fit: cover;
    border: 2.5px solid rgba(90, 79, 207, 0.35);
    box-shadow: 0 0 40px rgba(90, 79, 207, 0.12), 0 0 80px rgba(232, 160, 191, 0.06);
  }

  /* Text */
  .text { display: flex; flex-direction: column; gap: 8px; }
  .title { line-height: 1; }
  .prefix {
    font-weight: 800; font-size: 112px; color: #F0B840;
    letter-spacing: -2px;
  }
  .project {
    font-weight: 300; font-size: 112px; color: #8B83DB;
    letter-spacing: -1px;
  }
  .tagline {
    font-weight: 300; font-size: 28px;
    color: rgba(232, 224, 216, 0.4); letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <div class="accent"></div>

  <div class="avatar-wrap"><img class="avatar" src="../images/Generated Image April 11, 2026 - 7_07PM_cropped_transparent.png" alt="Kohaku"></div>

  <div class="text">
    <div class="title">
      <span class="prefix">Kohaku</span><span class="project">Terrarium</span>
    </div>
    <div class="tagline">A universal agent-level abstraction framework.</div>
  </div>
</body>
</html>
